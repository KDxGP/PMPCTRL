[logging]
# see https://docs.python.org/3/library/logging.html#logging-levels
log_level = WARNING

[api]
port = 8000

[pressure_control]
cycle_time = 0.01
tolerance_plus = 0.0
tolerance_minus = 10.0
# default pressure setpoint in mbar
setpoint = 962.9274
# maximum allowed pressure in mbar
pressure_max = 1084.0
# minimum allowed pressure in mbar
pressure_min = 450.0

[pressure_sensor]
cycle_time = 0.01
smbus_nr = 1
i2c_address = 0x76

[pump_control]
cycle_time = 0.5
pin_number = 24

[valve_control]
cycle_time = 0.01
pin_number = 23

[mode_hold]
# in mbar
pressure_target = 875.0

[mode_interval]
# peak pressure target in mbar
peak_pressure = 790.0
# interval time in seconds
interval_time = 20.0

[mode_pulsating]
# pump time in seconds
pump_time = 2.7
# release time in seconds
release_time = 1.7